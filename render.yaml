services:
  - type: web
    name: mithila-gold
    runtime: python
    buildCommand: ./render-build.sh
    startCommand: gunicorn poultry_farm.wsgi
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mithila-gold-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"

databases:
  - name: mithila-gold-db
    plan: free
