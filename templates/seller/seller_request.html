{% extends 'base.html' %}
{% load static crispy_forms_tags %}

{% block content %}
<div class="auth-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="auth-card">
          <div class="text-center mb-4">
            <h2 class="fw-bold" style="font-family:'Cinzel',serif;color:#7A0C2E;">Register as a Seller</h2>
            <p class="text-muted small">Join Mithila White Gold to sell your products.</p>
          </div>

          <form action="{% url 'store:seller_request' %}" method="post">
            {% csrf_token %}
            {% crispy form %}
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
