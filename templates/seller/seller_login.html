{% extends 'base.html' %}
{% load static crispy_forms_tags %}

{% block content %}
<div class="auth-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="auth-card">
          <!-- Logo & Header -->
          <div class="text-center mb-4">
            <h2 class="fw-bold" style="font-family:'Cinzel',serif;color:#7A0C2E;">Seller Login</h2>
            <p class="text-muted small">Login with your email to check approval status or access your seller dashboard.</p>
          </div>

          <form action="{% url 'store:seller_login' %}" method="post">
            {% csrf_token %}
            {% crispy form %}
          </form>

          <div class="text-center mt-4">
            <p class="text-muted mb-0">Don't have a seller account?
              <a href="{% url 'store:seller_request' %}" class="text-warning fw-bold">Apply here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
