{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0" style="border-radius:15px; overflow:hidden;">
        <div class="card-header bg-warning text-white p-4">
          <h4 class="mb-0 fw-bold">Review {{ order_item.product.name }}</h4>
        </div>
        <div class="card-body p-4">
          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-bold">Rating (1 to 5 Stars)</label>
              <select name="rating" class="form-select">
                <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
                <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
                <option value="3">⭐⭐⭐ 3 - Good</option>
                <option value="2">⭐⭐ 2 - Fair</option>
                <option value="1">⭐ 1 - Poor</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Review Message</label>
              <textarea name="message" class="form-control" rows="4" placeholder="Tell us what you liked about it..."></textarea>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold">Upload Image (Optional)</label>
              <input type="file" name="image" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-farm-primary w-100 py-2 fw-bold">
              Submit Review
            </button>
            <a href="{% url 'store:my_orders' %}" class="btn btn-outline-secondary w-100 py-2 mt-2">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
